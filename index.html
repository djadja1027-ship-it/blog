<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로또 5세트 추천기 - 다크모드 지원</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="header">
        <h1>로또 번호 5세트 추천기</h1>
        <div class="controls">
            <button id="theme-toggle">🌙 다크모드</button>
            <button id="generate-btn">새 번호 생성</button>
        </div>
    </div>

    <!-- Lotto Machine -->
    <div class="machine-container">
        <div id="lotto-drum" class="lotto-drum">
            <div class="mini-ball"></div>
            <div class="mini-ball"></div>
            <div class="mini-ball"></div>
            <div class="mini-ball"></div>
            <div class="mini-ball"></div>
            <div class="mini-ball"></div>
        </div>
        <div class="drum-stand"></div>
    </div>

    <div id="results-container" class="lotto-results">
        <!-- 5세트 결과가 여기에 생성됩니다. -->
    </div>

    <script src="main.js"></script>
</body>
</html>
