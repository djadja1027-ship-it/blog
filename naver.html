<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>네이버 블로그 자동화</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="header">
        <h1>네이버 블로그 자동화</h1>
        <div class="controls">
            <button id="theme-toggle">🌙 다크모드</button>
            <a href="index.html" style="text-decoration:none; color:var(--text-color); font-weight:bold; border:1px solid var(--border-color); padding:8px 16px; border-radius:20px;">로또 번호 생성기</a>
        </div>
    </div>

    <div class="container">
        <div class="form-container">
            <h2>키워드 기반 블로그 생성</h2>
            <div class="input-group">
                <label for="keyword">수집 키워드</label>
                <input type="text" id="keyword" placeholder="예: 제주도 여행, 맛집 추천, 최신 IT 트렌드">
            </div>
            <button id="collect-btn" class="main-btn">자료 수집 및 글쓰기 시작</button>
        </div>

        <div id="status-container" class="status-box" style="display:none;">
            <h3>진행 상태</h3>
            <ul id="status-list"></ul>
        </div>

        <div id="generated-container" class="generated-post" style="display:none;">
            <h4>✅ 생성된 네이버 블로그 포스팅</h4>
            <div id="post-result" class="post-preview"></div>
            <button id="auto-post-btn" class="main-btn" style="margin-top:15px; background-color:#03c75a;">네이버 블로그에 업로드</button>
        </div>
    </div>

    <script src="main.js"></script>
</body>
</html>
